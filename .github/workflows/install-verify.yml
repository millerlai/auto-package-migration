name: install-verify

# End-to-end installer coverage. ci.yml (ruff) and test.yml (pytest, incl. the
# manifest-drift guard) already cover the skill tree; what they can't see is the
# installers themselves placing files in the right place. This workflow runs the
# real installers into a project-local dir and checks the result — it's what
# catches path drift like the JS deps landing under the wrong scripts/ subdir.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # Line-ending guard. The cygwin job below can't catch CRLF: it sets
  # core.autocrlf=false before checkout and runs bash with -o igncr, so .sh
  # files are always LF there and any stray CR is ignored. This job inspects
  # the committed bytes directly — independent of any checkout/shell setting —
  # so a CRLF .sh (which makes Cygwin bash fail with $'\r') turns CI red.
  line-endings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert shell scripts have no CRLF
        run: |
          crlf=$(grep -lUP '\r$' $(git ls-files '*.sh') || true)
          if [ -n "$crlf" ]; then
            echo "These .sh files contain CRLF — Cygwin/bash will fail with \$'\r':"
            echo "$crlf"
            exit 1
          fi
          echo "OK: all tracked .sh files are LF-only"

  linux:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }} # makes `gh auth status` pass -> no auth prompt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          python -m pip install pipdeptree requests

      - name: Run install.sh (project-local, non-interactive)
        run: bash install.sh --project --yes

      - name: Verify installation
        run: PACKAGE_UPGRADE_SKILLS_ROOT=./.claude/skills bash verify_installation.sh

  # Guards the install.bat-specific drift fixed in this branch: its npm step must
  # place @babel/* under scripts/javascript/node_modules, not the old flat scripts/.
  windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install python deps
        run: python -m pip install pipdeptree requests

      - name: Run install.bat (project-local, non-interactive)
        shell: cmd
        run: .\install.bat --project --yes

      - name: Verify installation (verify_installation.bat)
        shell: cmd
        env:
          PACKAGE_UPGRADE_SKILLS_ROOT: .\.claude\skills
        run: .\verify_installation.bat

      - name: Assert skills copied and JS deps installed under javascript/
        shell: bash
        run: |
          root=./.claude/skills
          test -f "$root/package-upgrade/SKILL.md" \
            || { echo "package-upgrade not installed"; exit 1; }
          test -f "$root/package-upgrade-feedback/SKILL.md" \
            || { echo "package-upgrade-feedback not installed"; exit 1; }
          test -d "$root/package-upgrade/scripts/javascript/node_modules/@babel/parser" \
            || { echo "JS deps missing under scripts/javascript — install.bat npm path drift regressed"; exit 1; }
          echo "install.bat OK: skills copied and JS deps under scripts/javascript/"

  # Cygwin64 path. install-cygwin64.sh targets $USERPROFILE/.claude (the dir
  # Windows-native Claude Code actually reads, not Cygwin's $HOME), and
  # verify_installation_cygwin64.sh resolves that same path via cygpath. This
  # job guards the installer/verifier pairing end-to-end. node is intentionally
  # NOT installed: the verifier must degrade JS checks to warnings (a node-less
  # Cygwin is the real-world case), so a green run here also asserts that.
  windows-cygwin64:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Disable autocrlf (keep .sh files LF for Cygwin bash)
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps (Windows Python, reachable from Cygwin bash)
        run: python -m pip install pipdeptree requests

      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@v6
        with:
          install-dir: C:\cygwin64
          packages: git,jq,grep,findutils

      - name: Install skill (--global) then verify with no args
        shell: C:\cygwin64\bin\bash.exe --login -o igncr -eo pipefail '{0}'
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          # setup-python is not on Cygwin's default PATH; expose it so
          # detect_python (python3/python/py -3) resolves the Windows interpreter
          # that already has pipdeptree + requests installed.
          export PATH="$(cygpath -u "$pythonLocation"):$PATH"
          bash install-cygwin64.sh --global --yes
          bash verify_installation_cygwin64.sh
