name: test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      # Toolchains for the JS / Go helper-script tests (TODO 3.1 + 3.2).
      # Without these the test_*_js.py / test_*_go.py modules skip
      # automatically; having them installed turns the skips into real
      # coverage of the cross-language helpers.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS helper deps
        working-directory: package-upgrade/scripts/javascript
        run: npm ci

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run pytest
        run: uv run pytest
